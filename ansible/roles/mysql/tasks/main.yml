---
# MySQL setup. Creates one database and one user per environment.
# All schema files are shared — every environment uses the same schema.

- name: Install MySQL server
  apt:
    name:
      - mysql-server
      - python3-pymysql
    state: present
    update_cache: yes

- name: Ensure MySQL is running and enabled
  systemd:
    name: mysql
    state: started
    enabled: yes

# Initial root password setup. Detects whether the password is already configured
- name: Set root password (first-run only)
  shell: |
    if mysql --socket=/var/run/mysqld/mysqld.sock -u root -p'{{ mysql_root_password }}' -e "SELECT 1" 2>/dev/null; then
      echo "already_configured"
    else
      mysql --socket=/var/run/mysqld/mysqld.sock -u root \
        -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ mysql_root_password }}'; FLUSH PRIVILEGES;"
    fi
  args:
    executable: /bin/bash
  no_log: true
  register: mysql_root_setup
  changed_when: "'already_configured' not in mysql_root_setup.stdout"

- name: Remove anonymous users
  mysql_user:
    name: ''
    host_all: yes
    state: absent
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock

# One database per environment. Idempotent — re-runs do nothing if DB exists.
- name: Create application databases
  mysql_db:
    name: "{{ item.mysql_database }}"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
  loop: "{{ environments }}"
  loop_control:
    label: "{{ item.mysql_database }}"

# One user per environment, scoped to only its own database.
- name: Create application users with database-scoped privileges
  mysql_user:
    name: "{{ item.mysql_user_name }}"
    password: "{{ item.mysql_user_password }}"
    priv: "{{ item.mysql_database }}.*:ALL"
    host: localhost
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
  loop: "{{ environments }}"
  loop_control:
    label: "{{ item.mysql_user_name }}"
  no_log: true

- name: Copy schema file to server
  copy:
    src: 01-schema.sql
    dest: /tmp/01-schema.sql
    mode: '0600'

- name: Check whether schema is loaded in each database
  mysql_query:
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    query: >
      SELECT COUNT(*) AS cnt
      FROM information_schema.tables
      WHERE table_schema = %(db_name)s
        AND table_name = 'page_views'
    named_args:
      db_name: "{{ item.mysql_database }}"
  loop: "{{ environments }}"
  loop_control:
    label: "{{ item.mysql_database }}"
  register: schema_check
  check_mode: false
  no_log: false

- name: Import schema into databases that are still empty
  mysql_db:
    name: "{{ item.item.mysql_database }}"
    state: import
    target: /tmp/01-schema.sql
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
  when: 
    - not item.skipped | default(false)
    - item.query_result[0][0].cnt == 0
  loop: "{{ schema_check.results }}"
  loop_control:
    label: "{{ item.item.mysql_database }}"
  no_log: false

- name: Apply MySQL configuration overrides
  template:
    src: mysql.cnf.j2
    dest: /etc/mysql/mysql.conf.d/zz-custom.cnf
    mode: '0644'
  notify: restart mysql