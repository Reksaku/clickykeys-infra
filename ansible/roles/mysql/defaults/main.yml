mysql_root_password: "{{ mysql_root_password }}"
mysql_bind_address: "0.0.0.0"   # k8s pody muszą się dostać
mysql_port: 3306
mysql_databases:
  - name: "{{ mysql_database }}"
mysql_users:
  - name: "{{ mysql_user_name }}"
    password: "{{ mysql_user_password }}"
    priv: "{{ mysql_database }}.*:ALL"
    host: "%"