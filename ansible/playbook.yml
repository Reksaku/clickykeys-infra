---
- hosts: k8s
  become: true

  vars:
    swapfile_path: /swapfile
    swapfile_size: "{{ (ansible_memtotal_mb <= 4096) | ternary(ansible_memtotal_mb, (ansible_memtotal_mb / 2) | int) }}"

    # Defaults to ALL environments. Override from CLI to limit scope:
    #   ansible-playbook playbook.yml -e 'target_envs=["staging"]'
    target_envs: "{{ environments | map(attribute='name') | list }}"

  pre_tasks:
    - name: Update and upgrade apt packages
      apt:
        upgrade: yes
        update_cache: yes
        cache_valid_time: 86400

  # Host-wide roles run once, regardless of how many environments exist.
  roles:
    - swap
    - k3s
    - helm
    - mysql
    - k8s_cluster     # cluster-wide resources
    - monitoring       # cluster-wide monitoring stack

  # Application resources applied per environment
  tasks:
    - name: Apply per-environment Kubernetes resources
      include_role:
        name: k8s_env
      vars:
        env: "{{ item }}"
      loop: "{{ environments | selectattr('name', 'in', target_envs) | list }}"
      loop_control:
        label: "{{ item.name }}"
