# Rate limiting zones
# Tracking endpoints - strict limit: 10 requests/minute per IP
limit_req_zone $binary_remote_addr zone=tracking:10m rate=10r/m;
# API endpoints - moderate limit: 30 requests/minute per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

server {
    listen 80;
    server_name _;
    

    root /var/www/html;
    index index.php index.html;

    add_header X-Content-Type-Options    "nosniff"            always;
    add_header X-Frame-Options           "DENY"               always;
    add_header Referrer-Policy           "strict-origin"      always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;
    add_header X-XSS-Protection          "1; mode=block"      always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tracking endpoints - strict rate limit
    location ~ ^/db_php/(track|event)\.php$ {
        limit_req zone=tracking burst=5 nodelay;
        limit_req_status 429;
 
        include        fastcgi_params;
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
 
    # API endpoints - moderate rate limit
    location ~ ^/api/.*\.php$ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;
 
        include        fastcgi_params;
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   php:9000; 
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}