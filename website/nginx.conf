server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Static assets cache
    location ~* \.(css|js|png|gif|ico|jpg|jpeg|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Files 
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Temporaty PHP
    location ~ \.php$ {
        return 503 "PHP backend not yet configured";
    }

    # Deny acces to other files
    location ~ /\. {
        deny all;
    }
}
