name: Build & deploy to staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:

  phpunit_test:
    name: PHPUnit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./php-fpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: php-fpm/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('php-fpm/composer.lock', 'php-fpm/composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox


  # Build & push both images to GHCR.
  images_build:
    name: Build & push
    needs: phpunit_test
    runs-on: ubuntu-latest

    outputs:
      sha_tag: ${{ steps.sha.outputs.short }}
      owner:   ${{ steps.owner.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner name
        id: owner
        run: |
          LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "name=${LOWER}" >> "$GITHUB_OUTPUT"

      - name: Compute short SHA
        id: sha
        run: |
          SHORT=$(echo '${{ github.sha }}' | cut -c1-7)
          echo "short=${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push web image
        uses: docker/build-push-action@v5
        with:
          context: ./website
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/clickykeys-web:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/clickykeys-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Build & push php image
        uses: docker/build-push-action@v5
        with:
          context: ./php-fpm
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/clickykeys-php:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/clickykeys-php:latest
          cache-from: type=gha,scope=php
          cache-to: type=gha,scope=php,mode=max

      - name: Job summary
        run: |
          {
            echo "### Built images"
            echo ""
            echo "SHA tag: \`${{ steps.sha.outputs.short }}\`"
            echo ""
            echo "- \`${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/clickykeys-web:${{ steps.sha.outputs.short }}\`"
            echo "- \`${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/clickykeys-php:${{ steps.sha.outputs.short }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Deploy freshly built images to the staging
  deploy-staging:
    name: Deploy to staging
    needs: images_build
    runs-on: ubuntu-latest
    environment: staging

    concurrency:
      group: deploy-staging
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: SHA_TAG,OWNER
          script: |
            set -euo pipefail

            REGISTRY="ghcr.io"
            NAMESPACE="staging"

            echo "==> Deploying tag ${SHA_TAG} to namespace ${NAMESPACE}"

            export KUBECONFIG=/home/ubuntu/.kube/config

            # Update images on both deployments. Kubernetes automatically
            # creates a new ReplicaSet, preserving the prior one for rollback.

            kubectl set image deployment/nginx-web \
              nginx=${REGISTRY}/${OWNER}/clickykeys-web:${SHA_TAG} \
              -n ${NAMESPACE}

            kubectl set image deployment/php-fpm \
              php-fpm=${REGISTRY}/${OWNER}/clickykeys-php:${SHA_TAG} \
              -n ${NAMESPACE}

            # Block until both rollouts finish or fail. The 3-minute timeout

            kubectl rollout status deployment/nginx-web -n ${NAMESPACE} --timeout=180s
            kubectl rollout status deployment/php-fpm  -n ${NAMESPACE} --timeout=180s

            echo "==> Staging deploy complete"
        env:
          SHA_TAG: ${{ needs.images_build.outputs.sha_tag }}
          OWNER:   ${{ needs.images_build.outputs.owner }}

      - name: Job summary
        run: |
          {
            echo "### Deployed to staging"
            echo ""
            echo "Tag: \`${{ needs.images_build.outputs.sha_tag }}\`"
            echo "Namespace: \`staging\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  # Smoke test against the staging URL
  smoke-test-staging:
    name: Smoke test staging
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for smoke script)
        uses: actions/checkout@v4

      - name: Wait for traffic to settle
        run: sleep 10

      - name: Run smoke test
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
        run: |
          chmod +x scripts/smoke-check.sh
          ./scripts/smoke-check.sh

      - name: Job summary
        if: success()
        run: |
          {
            echo "### Smoke test passed ✓"
            echo ""
            echo "Endpoint: \`${{ secrets.STAGING_URL }}/api/healthz.php\` returned HTTP 200 with healthy payload."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure summary
        if: failure()
        run: |
          {
            echo "### Smoke test FAILED ✗"
            echo ""
            echo "Staging at \`${{ secrets.STAGING_URL }}\` is not responding correctly."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Deploy to production
    needs: 
      - smoke-test-staging
      - images_build
    runs-on: ubuntu-latest
    environment: production

    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: SHA_TAG,OWNER,PROD_NAMESPACE,COMMIT_SHA,RUN_URL
          script: |
            set -euo pipefail

            REGISTRY="ghcr.io"

            echo "== Deploying tag ${SHA_TAG} to namespace ${PROD_NAMESPACE}"

            export KUBECONFIG=/home/ubuntu/.kube/config

            # Deployments
            kubectl set image deployment/nginx-web \
              nginx=${REGISTRY}/${OWNER}/clickykeys-web:${SHA_TAG} \
              -n ${PROD_NAMESPACE}

            kubectl set image deployment/php-fpm \
              php-fpm=${REGISTRY}/${OWNER}/clickykeys-php:${SHA_TAG} \
              -n ${PROD_NAMESPACE}

            # Annotate the deployments
            kubectl annotate deployment/nginx-web \
              kubernetes.io/change-cause="GHA ${SHA_TAG} | commit ${COMMIT_SHA:0:7} | ${RUN_URL}" \
              -n ${PROD_NAMESPACE} --overwrite

            kubectl annotate deployment/php-fpm \
              kubernetes.io/change-cause="GHA ${SHA_TAG} | commit ${COMMIT_SHA:0:7} | ${RUN_URL}" \
              -n ${PROD_NAMESPACE} --overwrite


            kubectl rollout status deployment/nginx-web -n ${PROD_NAMESPACE} --timeout=180s
            kubectl rollout status deployment/php-fpm -n ${PROD_NAMESPACE} --timeout=180s

            echo "==> Production deploy complete"

        env:
          SHA_TAG: ${{ needs.images_build.outputs.sha_tag }}
          OWNER: ${{ needs.images_build.outputs.owner}}
          PROD_NAMESPACE: ${{ secrets.PROD_NAMESPACE }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      
      - name: Job summary
        run: |
          {
            echo "### Deployed to production"
            echo ""
            echo "Tag: \`${{ needs.images_build.outputs.sha_tag }}\`"
            echo "Namespace: \`${{ secrets.PROD_NAMESPACE }}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-test-production:
    name: Smoke test production
    needs: 
      - deploy-production
      - images_build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for smoke script)
        uses: actions/checkout@v4

      - name: Wait for traffic to settle
        run: sleep 10

      - name: Run smoke test
        env:
          BASE_URL: ${{ secrets.PROD_URL }}
        run: |
          chmod +x scripts/smoke-check.sh
          ./scripts/smoke-check.sh

      - name: Job summary
        if: success()
        run: |
          {
            echo "### Smoke test passed ✓"
            echo ""
            echo "Endpoint: \`${{ secrets.PROD_URL }}/api/healthz.php\` returned HTTP 200 with healthy payload."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Rollback on smoke failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: PROD_NAMESPACE
          script: |
            set -euo pipefail
            export KUBECONFIG=/home/ubuntu/.kube/config

            echo "==> SMOKE FAILED — rolling back to previous ReplicaSet"

            kubectl rollout undo deployment/nginx-web -n ${PROD_NAMESPACE}
            kubectl rollout undo deployment/php-fpm  -n ${PROD_NAMESPACE}

            kubectl annotate deployment/nginx-web \
              kubernetes.io/change-cause="AUTO-ROLLBACK: smoke test failed" \
              -n ${PROD_NAMESPACE} --overwrite
            kubectl annotate deployment/php-fpm \
              kubernetes.io/change-cause="AUTO-ROLLBACK: smoke test failed" \
              -n ${PROD_NAMESPACE} --overwrite

            kubectl rollout status deployment/nginx-web -n ${PROD_NAMESPACE} --timeout=180s
            kubectl rollout status deployment/php-fpm  -n ${PROD_NAMESPACE} --timeout=180s

            echo "==> Rollback complete. Production is back on previous version."
        env:
          PROD_NAMESPACE: ${{ secrets.PROD_NAMESPACE }}
      
      - name: Failure summary
        if: failure() 
        run: |
          {
            echo "### ✗ PRODUCTION SMOKE FAILED — auto-rollback attempted"
            echo ""
            echo "Deploy tag: \`${{ needs.images_build.outputs.sha_tag }}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"