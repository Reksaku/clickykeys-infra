name: Deploy ClickyKeys

on:
  push:
    branches: [ test/Ci/Cd ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: PHP check
        run: |
          sudo apt-get install -y php-cli
          find ./web -name "*.php" -exec php -l {} \;
          echo "PHP files with status OK" 

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Verify passwords in .env.example
        run: |
          if grep -E "(password|secret|key)\s*=\s*['\"]?[a-zA-Z0-9!@#\$%]{8,}" .env.example; then
            echo "ERROR: .env.example contains passwords!"
            exit 1
          fi
          echo "env.example OK"
          
  skan_image:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'clickykeys-php:latest'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  deploy:
    runs-on: ubuntu-latest
    needs: skan_image

    steps:
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.TEST_HOST }}
          username: ${{ secrets.TEST_USER }}
          key: ${{ secrets.TEST_SSH_KEY }}
          script: |
            cd ~/clickykeys-infra

            # Save of rollback point
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "Rollback point: $PREVIOUS_COMMIT"

            # Deploy
            git pull origin main
            docker compose up -d --build
            docker image prune -f

            # Docker contener rebuild delay
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" $DOMAIN)
              [ "$STATUS" = "200" ] && { echo "OK"; break; }
              [ $i -eq 12 ] && { echo "FAIL"; exit 1; }
              echo "Attempt $i — HTTP $STATUS, retry..."
              sleep 10
            done

            # Web health check (HTTP 200)
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PROD_WEB_DOMAIN }})

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Deploy OK — HTTP $HTTP_STATUS"
            else
              echo "ERROR — HTTP $HTTP_STATUS, rollback..."
              git reset --hard $PREVIOUS_COMMIT
              docker compose up -d --build
              echo "Rollback finished"
              exit 1   # Return deploy fail
            fi
            
